name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.configuration }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SoftEngine.slnx

      - name: Build
        run: dotnet build SoftEngine.slnx --configuration ${{ matrix.configuration }} --no-restore

      - name: Test
        run: dotnet test SoftEngine.slnx --configuration ${{ matrix.configuration }} --no-build --verbosity normal
